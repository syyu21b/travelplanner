<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 480" preserveAspectRatio="xMidYMid slice">
<defs>

  <!-- ── 하늘: 아침 안개 파스텔 그라디언트 ── -->
  <linearGradient id="gSky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#8baec5"/>
    <stop offset="15%"  stop-color="#a2bece"/>
    <stop offset="32%"  stop-color="#bacdd8"/>
    <stop offset="50%"  stop-color="#cfc5bc"/>
    <stop offset="66%"  stop-color="#ddd0c6"/>
    <stop offset="80%"  stop-color="#e5d8cc"/>
    <stop offset="92%"  stop-color="#ebddd3"/>
    <stop offset="100%" stop-color="#ede0d6"/>
  </linearGradient>

  <!-- 지평선 안개 레이어 -->
  <linearGradient id="gMist" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#f5ede8" stop-opacity="0"/>
    <stop offset="55%"  stop-color="#f5ede8" stop-opacity="0.04"/>
    <stop offset="75%"  stop-color="#f5ede8" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#f5ede8" stop-opacity="0.50"/>
  </linearGradient>

  <!-- 지형 그라디언트들 -->
  <linearGradient id="gT1" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#c8b49a"/>
    <stop offset="100%" stop-color="#b89c82"/>
  </linearGradient>
  <linearGradient id="gT2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#b89878"/>
    <stop offset="100%" stop-color="#a08060"/>
  </linearGradient>
  <linearGradient id="gT3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#a08268"/>
    <stop offset="100%" stop-color="#886248"/>
  </linearGradient>
  <linearGradient id="gT4" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#886050"/>
    <stop offset="100%" stop-color="#6a4030"/>
  </linearGradient>
  <linearGradient id="gT5" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#6a4838"/>
    <stop offset="100%" stop-color="#4a2c1c"/>
  </linearGradient>

  <!-- 필터 -->
  <filter id="fFar">  <feGaussianBlur stdDeviation="5"/></filter>
  <filter id="fMid">  <feGaussianBlur stdDeviation="2.5"/></filter>
  <filter id="fNear"> <feGaussianBlur stdDeviation="1"/></filter>
  <filter id="fGlow"> <feGaussianBlur stdDeviation="3"/></filter>

  <!-- 열기구 심볼 (기본형) -->
  <symbol id="balloon" viewBox="-40 -80 80 130">
    <!-- 외형 -->
    <path d="M0,-80 Q28,-78 46,-58 Q60,-38 62,-14 Q62,12 52,34 Q38,58 18,70 Q8,78 0,80 Q-8,78 -18,70 Q-38,58 -52,34 Q-62,12 -62,-14 Q-60,-38 -46,-58 Q-28,-78 0,-80 Z"
          fill="#e8ddd0"/>
    <!-- 줄무늬들 -->
    <path d="M0,-80 Q10,-76 15,-58 Q18,-38 16,-14 Q14,12 8,34 Q4,58 0,80 Q-4,58 -8,34 Q-14,12 -16,-14 Q-18,-38 -15,-58 Q-10,-76 0,-80 Z"
          fill="#d4c4b0" opacity="0.6"/>
    <!-- 로프 -->
    <line x1="-30" y1="72" x2="-18" y2="90" stroke="#8a6848" stroke-width="1.5"/>
    <line x1="30"  y1="72" x2="18"  y2="90" stroke="#8a6848" stroke-width="1.5"/>
    <!-- 바구니 -->
    <rect x="-20" y="89" width="40" height="18" rx="4" fill="#7a5838" opacity="0.9"/>
  </symbol>

</defs>

<!-- ══════════════ SKY ══════════════ -->
<rect width="1440" height="480" fill="url(#gSky)"/>
